# Catppuccin Mocha-inspired palette without external dependencies.

set -g status-style "bg=default,fg=#cdd6f4"
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#b4befe"

set -g window-status-separator ""
set -g window-status-format " #[fg=#6c7086,bg=default]#[fg=#cdd6f4,bg=#6c7086]#I #[fg=#bac2de,bg=#313244]#W#[fg=#313244,bg=default]"
set -g window-status-current-format " #[fg=#89b4fa,bg=default]#[fg=#1e1e2e,bg=#89b4fa,bold]#I #[fg=#cdd6f4,bg=#45475a,bold]#W#[fg=#45475a,bg=default]"
set -g window-status-last-style "fg=#f9e2af"
set -g window-status-activity-style "fg=#f38ba8"
setw -g automatic-rename on
setw -g automatic-rename-format '#{?pane_in_mode,[copy],#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}}'
