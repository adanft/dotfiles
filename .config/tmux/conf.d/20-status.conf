set -g status-justify left
set -g status-left-length 20
set -g status-right-length 100
set -g status-interval 2

# Left: compact session block only.
set -g status-left "#[fg=#a6e3a1,bg=default]#[fg=#1e1e2e,bg=#a6e3a1,bold]#S#[fg=#a6e3a1,bg=default]"

# Right: system metrics.
set -g status-right '#[fg=#a6e3a1,bg=default]#[fg=#1e1e2e,bg=#a6e3a1,bold] #(/home/dioby/.config/tmux/scripts/project_name.sh "#{pane_current_path}") #[fg=#a6e3a1,bg=#f9e2af]#[fg=#1e1e2e,bg=#f9e2af] #(/home/dioby/.config/tmux/scripts/cpu_usage.sh) #[fg=#f9e2af,bg=#cba6f7]#[fg=#1e1e2e,bg=#cba6f7] #(/home/dioby/.config/tmux/scripts/ram_usage.sh) #[fg=#cba6f7,bg=default]'
