# ─── Source ───────────────────────────────────────────────────────────────────
source = $HOME/.config/hypr/mocha.conf

# ─── Monitors ────────────────────────────────────────────────────────────────
monitor = , preferred, auto, 1

# ─── Aliases ─────────────────────────────────────────────────────────────────
$terminal = kitty
$terminal_code = ghostty
$fileManager = thunar
$menu = rofi -no-config -no-lazy-grab -show drun -modi drun -theme ~/.config/rofi/themes/launcher.rasi
$picker = hyprpicker -a
$move_workspace = $HOME/.config/hypr/scripts/movetoworkspace.sh
$move_to_workspace = $HOME/.config/hypr/scripts/moveworkspace.sh
$toggle_layout = $HOME/.config/hypr/scripts/toggle_layout.sh
$screenshot = $HOME/.config/rofi/scripts/screenshot.sh

# ─── Autostart ───────────────────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = swaync
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = $HOME/.config/hypr/scripts/gdk_script

# ─── Environment ──────────────────────────────────────────────────────────────
env = GTK_THEME, Sweet-Ambar-Blue-Dark-v40
env = XCURSOR_THEME, Sweet-cursors
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_THEME, Sweet-cursors
env = HYPRCURSOR_SIZE, 24
envd = XDG_CURRENT_DESKTOP, Hyprland
envd = XDG_SESSION_DESKTOP, Hyprland
envd = XDG_SESSION_TYPE, wayland

# ─── General ─────────────────────────────────────────────────────────────────
general {
  gaps_in = 3
  gaps_out = 6
  border_size = 2
  col.active_border = $mauve
  col.inactive_border = $overlay0
  resize_on_border = false
  allow_tearing = false
  layout = dwindle
}

# ─── Decoration ──────────────────────────────────────────────────────────────
decoration {
  rounding = 6
  rounding_power = 2
  active_opacity = 1.0
  inactive_opacity = 1.0

  shadow {
    enabled = false
  }

  blur {
    enabled = false
  }
}

# ─── Animations ──────────────────────────────────────────────────────────────
animations {
  enabled = true

  bezier = easeOutQuint, 0.23, 1.00, 0.32, 1.00
  bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1.00
  bezier = linear, 0.00, 0.00, 1.00, 1.00
  bezier = almostLinear, 0.50, 0.50, 0.75, 1.00
  bezier = quick, 0.15, 0.00, 0.10, 1.00

  animation = global, 1, 10.00, default
  animation = border, 1, 5.39, easeOutQuint
  animation = windows, 1, 4.79, easeOutQuint
  animation = windowsIn, 1, 4.10, easeOutQuint, popin 87%
  animation = windowsOut, 1, 1.49, linear, popin 87%
  animation = fadeIn, 1, 1.73, almostLinear
  animation = fadeOut, 1, 1.46, almostLinear
  animation = fade, 1, 3.03, quick
  animation = layers, 1, 3.81, easeOutQuint
  animation = layersIn, 1, 4.00, easeOutQuint, fade
  animation = layersOut, 1, 1.50, linear, fade
  animation = fadeLayersIn, 1, 1.79, almostLinear
  animation = fadeLayersOut, 1, 1.39, almostLinear
  animation = workspaces, 1, 1.94, almostLinear, fade
  animation = workspacesIn, 1, 1.21, almostLinear, fade
  animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# ─── Layouts ─────────────────────────────────────────────────────────────────
dwindle {
  pseudotile = true
  preserve_split = true
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
  vfr = true
}

# ─── Input ──────────────────────────────────────────────────────────────────
input {
  kb_layout = us
  follow_mouse = 1
  sensitivity = 0

  touchpad {
    natural_scroll = false
    tap-to-click = true
  }
}

# ─── Keybinds ────────────────────────────────────────────────────────────────
$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, RETURN, exec, $terminal_code
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, SPACE, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, TAB, exec, $toggle_layout

bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu
bind = $mainMod, X, exec, ~/.config/rofi/scripts/power-menu.sh
bind = $mainMod SHIFT, P, exec, $picker
bind = , PRINT, exec, $screenshot

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8

bind = $mainMod CTRL, left, exec, $move_workspace prev
bind = $mainMod CTRL, right, exec, $move_workspace next
bind = $mainMod CTRL SHIFT, left, exec, $move_to_workspace prev
bind = $mainMod CTRL SHIFT, right, exec, $move_to_workspace next

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod CTRL, mouse:272, resizewindow

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ─── Window Rules ────────────────────────────────────────────────────────────
windowrule {
  name = float-class-floating
  match:class = floating
  float = on
}

windowrule {
  name = suppress-maximize-events
  match:class = .*
  suppress_event = maximize
}

windowrule {
  name = fix-xwayland-drags
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false
  no_focus = true
}

windowrule {
  name = move-hyprland-run
  match:class = hyprland-run
  move = 20 monitor_h-120
  float = true
}
