# Laptop profile: preserve battery while keeping wake/resume predictable.

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "on" })'
}

listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Dim before turning displays off. brightnessctl is optional so installs without
# laptop brightness support do not fail.
listener {
    timeout = 600
    on-timeout = command -v brightnessctl >/dev/null 2>&1 && brightnessctl -s set 10%
    on-resume = command -v brightnessctl >/dev/null 2>&1 && brightnessctl -r
}

listener {
    timeout = 900
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "off" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "on" })'
}

listener {
    timeout = 1800
    on-timeout = systemctl suspend
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "on" })'
}
