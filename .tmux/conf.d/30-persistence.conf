# Persistence and accidental-close protection.
#
# Important distinction:
# - tmux keeps sessions alive when the client terminal detaches/closes.
# - tmux does NOT resurrect panes/windows killed by mistake by default.

# Be explicit about the defaults we rely on: do not kill the server just
# because there are no attached clients.
set -g exit-unattached off
set -g destroy-unattached off

# Ask before destructive actions. This protects the common “oops, I closed it”
# cases without changing normal shell behavior like `exit` or Ctrl-d.
bind-key x confirm-before -p "Kill current pane? (y/n)" kill-pane
bind-key & confirm-before -p "Kill current window? (y/n)" kill-window
bind-key K confirm-before -p "Kill current session? (y/n)" kill-session

# Full session resurrection.
#
# TPM is the plugin manager. tmux-resurrect restores saved sessions/layouts;
# tmux-continuum saves automatically and restores on tmux start.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Capture pane contents so restored sessions keep useful scrollback context.
set -g @resurrect-capture-pane-contents 'on'

# Save every 15 minutes and restore automatically when tmux starts.
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Hyprland runs on Wayland, so use wl-clipboard explicitly.
set -g @override_copy_command 'wl-copy'
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'

# TPM must be loaded after plugin declarations.
run '~/.tmux/plugins/tpm/tpm'
